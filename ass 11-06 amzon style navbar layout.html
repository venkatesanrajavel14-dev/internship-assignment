<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon-like Navbar</title>
  <link rel="stylesheet" href="styles amazon style.css">
</head>
<body>
  <div class="navbar">
    <!-- Logo -->
    <a href="#" class="logo">AmazonClone</a>

    <!-- Search Box -->
    <div class="search-box">
      <input type="text" placeholder="Search products...">
      <button class="search-btn">Search</button>
    </div>

    <!-- Cart & Sign In -->
    <div class="nav-buttons">
      <button>🛒 Cart</button>
      <button>Sign In</button>
    </div>
  </div>
</body>
</html>
