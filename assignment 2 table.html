<!DOCTYPE html>
<html>
<head>
    <title>Student Report Card</title>
    <style>
        table {
            
        th {
            background-color: #37923a;
            color: white;
        }
        td {
            background-color: #ffffff;
        }
        
        }
    </style>
</head>
<body>
    <h2>Student Report Card</h2>
    <table border="1">
        <caption>Student Report Card</caption>
        <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Mathematics</td>
            <td>85</td>
            <td>A</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>78</td>
            <td>B+</td>
        </tr>
        <tr>
            <td>English</td>
            <td>92</td>
            <td>A+</td>
        </tr>
        <tr>
            <td>Social Studies</td>
            <td>74</td>
            <td>B</td>
        </tr>
        <tr>
            <td>Computer Science</td>
            <td>88</td>
            <td>A</td>
        </tr>
    </table>
</body>
</html>
